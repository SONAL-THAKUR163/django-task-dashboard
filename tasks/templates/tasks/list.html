<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Django Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <div class="card shadow-sm p-4">
            <h2 class="text-center mb-4 text-primary">🎯 Task Dashboard</h2>

            <form method="POST" class="d-flex mb-4">
                {% csrf_token %}
                <input type="text" name="title" class="form-control me-2" placeholder="What needs to get done?" required>
                <button type="submit" class="btn btn-primary">Add</button>
            </form>

            <ul class="list-group">
                {% for task in tasks %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            {% if task.complete %}
                                <del class="text-muted fs-5">{{ task.title }}</del>
                            {% else %}
                                <span class="fs-5">{{ task.title }}</span>
                            {% endif %}
                        </div>
                        <div>
                            {% if task.complete %}
                                <a href="{% url 'toggle' task.id %}" class="btn btn-sm btn-secondary me-2">Undo</a>
                            {% else %}
                                <a href="{% url 'toggle' task.id %}" class="btn btn-sm btn-success me-2">Complete</a>
                            {% endif %}
                            <a href="{% url 'delete' task.id %}" class="btn btn-sm btn-danger">Delete</a>
                        </div>
                    </li>
                {% empty %}
                    <li class="list-group-item text-center text-muted py-3">No tasks left! Nice job.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
